<body class="h-full flex flex-col font-body-lg text-on-background">
<!-- TopNavBar Mapping -->
<header class="bg-[#F0FDF4] dark:bg-slate-950 border-b border-[#D1FAE5] dark:border-emerald-900/30 fixed top-0 w-full z-50">
<div class="flex justify-between items-center w-full px-8 h-16 max-w-7xl mx-auto font-['Public_Sans'] antialiased">
<div class="text-lg font-bold tracking-tight text-[#065F46] dark:text-emerald-400">
                Pokhara Metropolitan City
            </div>
<div class="flex items-center gap-stack-md">
<button class="text-slate-600 dark:text-slate-400 font-medium hover:bg-[#D1FAE5] dark:hover:bg-emerald-900/20 transition-colors cursor-pointer px-4 py-2 rounded-lg text-body-sm">
                    Support
                </button>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-page-padding-x py-section-gap mt-16">
<div class="w-full max-w-md">
<!-- Branding Section -->
<div class="text-center mb-stack-lg">
<h1 class="font-headline text-headline text-primary mb-1">Civic Report</h1>
<p class="font-label text-label text-outline uppercase tracking-wider">Pokhara Metropolitan City</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-[#D1FAE5] rounded-lg p-stack-lg shadow-none">
<form class="space-y-stack-md">
<div>
<label class="block font-label text-label text-on-surface-variant mb-2 uppercase" for="email">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-secondary text-on-surface rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent outline-none transition-all font-body-lg" id="email" name="email" placeholder="citizen@pokhara.gov.np" required="" type="email"/>
</div>
<div class="relative">
<label class="block font-label text-label text-on-surface-variant mb-2 uppercase" for="password">Password</label>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-secondary text-on-surface rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent outline-none transition-all font-body-lg" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="font-body-sm text-primary hover:underline transition-all" href="#">Forgot password?</a>
</div>
<button class="w-full bg-primary-container text-white font-medium py-3 rounded-lg hover:bg-primary transition-colors cursor-pointer active:opacity-80" type="submit">
                        Login
                    </button>
</form>
<div class="mt-stack-lg text-center border-t border-[#D1FAE5] pt-stack-md">
<p class="font-body-sm text-on-surface-variant">
                        Don't have an account? 
                        <a class="text-primary font-semibold hover:underline" href="#">Register</a>
</p>
</div>
</div>
<!-- Descriptive Image / Texture Placeholder -->
<div class="mt-stack-lg rounded-lg overflow-hidden border border-[#D1FAE5]">
<img alt="Pokhara Cityscape" class="w-full h-32 object-cover opacity-80 grayscale hover:grayscale-0 transition-all duration-700" data-alt="Scenic wide angle view of Pokhara city with the Annapurna mountain range in the background under a clear blue sky" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFSaHEpZKH2Qd1DmkfLDmxMdeO7LpNO_Kk3_yLBHs2MmyvPA0WF46AuhlsY623puVek6I4ByJnYCKNm3e7C_AGdjCY6-UPQh2j6qYLtmayQGJJVGNb06xFFsiaBQZKECJwp8QEmkpc7M8NKTRfZ0qX3-WhqqG_t1DcnXwEBy5XIj_WilkC0gUmE0nPKqHGaBcANhpz0xsRqPtxLtJRJm_TBqxqtYH_3a-UJw5XSJImJvrfa1TDm67jI_KMNMWGgeKOkdosa2phO1E"/>
